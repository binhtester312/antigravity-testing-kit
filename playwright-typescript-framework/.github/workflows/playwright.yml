name: 🎭 Playwright E2E Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  # Cho phép chạy thủ công từ GitHub UI
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
          - all
      grep_pattern:
        description: 'Test filter pattern (e.g., @smoke)'
        required: false
        default: ''

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # JOB 1: Install & Build Validation
  # ============================================================
  install:
    name: 📦 Install & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

  # ============================================================
  # JOB 2: Run Tests (Chromium — Default)
  # ============================================================
  test-chromium:
    name: 🧪 Tests — Chromium
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.browser == 'chromium' || github.event.inputs.browser == 'all' || github.event.inputs.browser == ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install npm packages (fallback)
        run: npm ci

      - name: Install Playwright browsers — Chromium only
        run: npx playwright install chromium --with-deps

      - name: Create .env file
        run: |
          cp .env.example .env
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "DEFAULT_USERNAME=${{ secrets.DEFAULT_USERNAME }}" >> .env
          echo "DEFAULT_PASSWORD=${{ secrets.DEFAULT_PASSWORD }}" >> .env
          echo "HEADLESS=true" >> .env
          echo "ENV=staging" >> .env

      - name: Run Playwright tests — Chromium
        run: |
          if [ -n "${{ github.event.inputs.grep_pattern }}" ]; then
            npx playwright test --project=chromium --grep "${{ github.event.inputs.grep_pattern }}"
          else
            npx playwright test --project=chromium
          fi
        env:
          CI: true

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 14

      - name: Upload Test Results (JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-chromium
          path: test-results/
          retention-days: 7

  # ============================================================
  # JOB 3: Run Tests (Firefox) — Optional
  # ============================================================
  test-firefox:
    name: 🦊 Tests — Firefox
    runs-on: ubuntu-latest
    needs: install
    if: github.event.inputs.browser == 'firefox' || github.event.inputs.browser == 'all'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install npm packages
        run: npm ci

      - name: Install Playwright browsers — Firefox only
        run: npx playwright install firefox --with-deps

      - name: Create .env file
        run: |
          cp .env.example .env
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "DEFAULT_USERNAME=${{ secrets.DEFAULT_USERNAME }}" >> .env
          echo "DEFAULT_PASSWORD=${{ secrets.DEFAULT_PASSWORD }}" >> .env
          echo "HEADLESS=true" >> .env

      - name: Run Playwright tests — Firefox
        run: npx playwright test --project=firefox
        env:
          CI: true

      - name: Upload HTML Report — Firefox
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-firefox
          path: playwright-report/
          retention-days: 14

  # ============================================================
  # JOB 4: Test Summary
  # ============================================================
  test-summary:
    name: 📊 Test Summary
    runs-on: ubuntu-latest
    needs: [test-chromium]
    if: always()
    steps:
      - name: Report Status
        run: |
          if [ "${{ needs.test-chromium.result }}" == "success" ]; then
            echo "✅ All tests PASSED"
          else
            echo "❌ Some tests FAILED — check artifacts for HTML report"
            exit 1
          fi
